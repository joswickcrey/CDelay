name: Build Mac

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download JUCE
      run: |
        git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

    - name: Update JUCE Path
      run: |
        sed -i '' 's|set(JUCE_PATH.*)|set(JUCE_PATH "${CMAKE_CURRENT_SOURCE_DIR}/JUCE" CACHE PATH "Path to JUCE")|' CMakeLists.txt

    - name: Configure CMake
      run: cmake -B build -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Check artifact structure
      run: |
        ls -la build/CDelay_artefacts/Release/VST3/
        ls -la build/CDelay_artefacts/Release/AU/
        file build/CDelay_artefacts/Release/VST3/CDelay.vst3

    - name: Find build artifacts
      run: find build -name "*.vst3" -o -name "*.component" 2>/dev/null

    - name: Zip Artifacts
      run: |
        cd build/CDelay_artefacts/Release/VST3
        zip -r ../../../../CDelay-VST3.zip CDelay.vst3
        cd ../../../../build/CDelay_artefacts/Release/AU
        zip -r ../../../../CDelay-AU.zip CDelay.component

    - name: Upload VST3
      uses: actions/upload-artifact@v4
      with:
        name: CDelay-Mac-VST3
        path: CDelay-VST3.zip

    - name: Upload AU
      uses: actions/upload-artifact@v4
      with:
        name: CDelay-Mac-AU
        path: CDelay-AU.zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: latest
        name: Latest Build
        files: |
          CDelay-VST3.zip
          CDelay-AU.zip